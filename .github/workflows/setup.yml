name: Setup Cloudflare Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Create D1 database (if needed)
        run: npx wrangler d1 create tidal-collab-db || echo "Database may already exist, continuing..."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Get D1 database ID and update wrangler.toml
        run: |
          DB_JSON=$(npx wrangler d1 list --json)
          DB_ID=$(echo "$DB_JSON" | jq -r '.[] | select(.name == "tidal-collab-db") | .uuid')
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "ERROR: Could not find database ID for tidal-collab-db"
            echo "$DB_JSON"
            exit 1
          fi
          echo "Found database ID: $DB_ID"
          sed -i "s/database_id = \".*\"/database_id = \"$DB_ID\"/" wrangler.toml
          echo "Updated wrangler.toml:"
          cat wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Initialize D1 schema
        run: npx wrangler d1 execute tidal-collab-db --remote --file=./schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker (needed before secrets can be set)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Cloudflare Worker secrets
        run: |
          if [ -n "$TIDAL_CLIENT_ID" ]; then
            printf '%s' "$TIDAL_CLIENT_ID" | npx wrangler secret put TIDAL_CLIENT_ID
          else
            echo "Skipping TIDAL_CLIENT_ID (not set)"
          fi

          if [ -n "$TIDAL_CLIENT_SECRET" ]; then
            printf '%s' "$TIDAL_CLIENT_SECRET" | npx wrangler secret put TIDAL_CLIENT_SECRET
          else
            echo "Skipping TIDAL_CLIENT_SECRET (not set)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TIDAL_CLIENT_ID: ${{ secrets.TIDAL_CLIENT_ID }}
          TIDAL_CLIENT_SECRET: ${{ secrets.TIDAL_CLIENT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}

      - name: Commit updated wrangler.toml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet wrangler.toml; then
            echo "No changes to wrangler.toml"
          else
            git add wrangler.toml
            git commit -m "chore: update D1 database ID from setup workflow"
            git push
          fi
